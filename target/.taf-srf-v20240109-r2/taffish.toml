[package]
name = "srf"
kind = "tool"
version = "20240109"
release = 2
license = "Apache-2.0"
main = "src/main.taf"

[repository]
url = "https://github.com/taffish/srf"

[meta]
domain = "bio"
categories = ["satellite-repeat", "repeat-analysis", "kmer", "assembly"]
keywords = ["srf", "Satellite Repeat Finder", "satellite DNA", "tandem repeat", "k-mer", "KMC", "k8"]
description = "SRF assembles satellite repeat units from high-occurrence k-mer count tables."

[command]
name = "taf-srf"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/srf:20240109-r2"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[upstream]
name = "srf"
type = "github"
repo = "lh3/srf"
homepage = "https://github.com/lh3/srf"
release_url = "https://github.com/lh3/srf/commit/e54ca8c8eccf6b1f19428b0f862f2c90575290a0"
downloads = "https://github.com/lh3/srf/archive/e54ca8c8eccf6b1f19428b0f862f2c90575290a0.tar.gz"
version = "20240109"
commit = "e54ca8c8eccf6b1f19428b0f862f2c90575290a0"
commit_date_utc = "2024-01-08T21:02:55Z"
license = "MIT"
citation = "Zhang, Chu, Cheng and Li 2023, arXiv:2304.09729"
arxiv = "2304.09729"
watch = "manual"

[smoke]
backend = "docker"
timeout = 120
exist = ["srf", "srfutils.js", "fmd-occ", "k8", "gzip", "ldd", "sh"]
test = ["test \"$(sed -n 's/^commit=//p' /opt/srf/share/doc/srf/source.txt)\" = 'e54ca8c8eccf6b1f19428b0f862f2c90575290a0' && test \"$(sed -n 's/^version=//p' /opt/srf/share/doc/srf/source.txt)\" = '20240109' && { srf 2>&1 || true; } | grep -F 'Usage: srf [options] <in.txt>' >/dev/null && { fmd-occ 2>&1 || true; } | grep -F 'Usage: fmd-occ [options] <in1.fmd>' >/dev/null && { srfutils.js 2>&1 || true; } | grep -F 'Usage: srfutils.js <command>' >/dev/null && ldd $(command -v srf) | grep -F 'libz.so' >/dev/null && ldd $(command -v k8) | grep -F 'libz.so' >/dev/null", "mkdir -p /tmp/taf-srf-core && cd /tmp/taf-srf-core && printf 'CCCCC 10\\n' > count.txt && srf -p tiny -l 1 count.txt > out.fa 2> out.log && grep -F '[M::main] read 1 distinct k-mers' out.log >/dev/null && grep -F '>tiny#circ1-1 min=10,max=10,avg=10' out.fa >/dev/null && grep -Fx 'C' out.fa >/dev/null && gzip -c count.txt > count.txt.gz && srf -p gz -l 1 count.txt.gz > gz.fa && grep -F '>gz#circ1-1' gz.fa >/dev/null", "mkdir -p /tmp/taf-srf-utils && cd /tmp/taf-srf-utils && printf '>circ1-4\\nACGT\\n' > circ.fa && srfutils.js enlong -l 10 circ.fa > enlong.fa && grep -F 'ACGTACGTACGT' enlong.fa >/dev/null && printf '>a\\nACGT\\n>b\\nACGT\\n' > merge.fa && srfutils.js merge merged merge.fa > merged.fa && grep -F '>merged*0001 a' merged.fa >/dev/null && test \"$(grep -c '^>' merged.fa)\" -eq 1 && printf 'chr1\\t0\\t20\\tcirc1-4\\t2.5\\t100\\t4\\t1\\n' > hit.bed && srfutils.js bed2abun hit.bed > abun.txt && grep -F 'circ1-4' abun.txt >/dev/null"]
